<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clientes — Beleza Boost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="conteudo">
      <div class="toolbar">
        <div>
          <div class="titulo-pagina">👥 Clientes</div>
          <div class="subtitulo" style="margin-bottom:0" id="contagem"></div>
        </div>
        <button class="btn ouro" id="btnNovo" style="display:none" onclick="abrirModal()">➕ Novo Cliente</button>
      </div>

      <div class="filtros">
        <input type="text" id="fBusca" placeholder="🔍 Buscar cliente...">
        <select id="fStatus">
          <option value="">Todos os status</option>
          <option value="ativo">🟢 Ativo</option>
          <option value="prelancamento">🟡 Em Inauguração</option>
          <option value="saindo">🔴 Saindo</option>
          <option value="saiu">📁 Histórico (saíram)</option>
        </select>
        <select id="fMarca"><option value="">Todas as marcas</option></select>
        <select id="fPessoa"><option value="">Todas as pessoas</option></select>
        <select id="fOrdem">
          <option value="alfabetica">🔤 Ordem alfabética</option>
          <option value="saida-recente">📅 Saída mais recente primeiro</option>
          <option value="saida-antiga">📅 Saída mais antiga primeiro</option>
        </select>
      </div>

      <div class="tabela" id="tabela"></div>
    </main>
  </div>

  <!-- Modal de cliente -->
  <div class="modal-fundo" id="modalFundo">
    <div class="modal">
      <h2 id="modalTitulo">➕ Novo Cliente</h2>
      <form id="formCliente">
        <div class="grid-2">
          <div><label>Nome do cliente *</label><input id="cNome" required placeholder="Ex.: Fast Escova Aclimação"></div>
          <div><label>Marca / Rede</label><input id="cMarca" list="marcas" placeholder="Ex.: Fast Escova"><datalist id="marcas"></datalist></div>
        </div>
        <div class="grid-2">
          <div><label>Status <small style="color:var(--texto-suave)">(Em Inauguração é automático pela data)</small></label>
            <select id="cStatus">
              <option value="ativo">🟢 Ativo</option>
              <option value="saindo">🔴 Saindo (sem data definida)</option>
            </select>
          </div>
          <div><label>📅 Data de saída <small style="color:var(--texto-suave)">(passou a data → vai pro histórico)</small></label><input type="date" id="cSaida"></div>
        </div>
        <div class="grid-2" id="camposFuncoes"></div>
        <div class="grid-2">
          <div><label>📅 Data de inauguração <small style="color:var(--texto-suave)">(futura → Em Inauguração)</small></label><input type="date" id="cInauguracao"></div>
          <div><label>🎂 Aniversário da unidade (dia/mês)</label>
            <div style="display:flex;gap:8px">
              <select id="cAnivDia" style="flex:1"><option value="">Dia</option></select>
              <select id="cAnivMes" style="flex:2"><option value="">Mês</option></select>
            </div>
          </div>
        </div>
        <div class="grid-2">
          <div><label>📅 Entrada na carteira</label><input type="date" id="cEntrada"></div>
          <div><label>Acesso do Tráfego</label>
            <select id="cAcesso"><option value="sim">✅ Sim</option><option value="nao">❌ Não</option></select>
          </div>
        </div>
        <label>📝 Observações</label>
        <textarea id="cObs" rows="2"></textarea>
        <div class="erro" id="modalErro"></div>
        <div class="rodape">
          <button type="button" class="btn perigo" id="btnExcluir" style="display:none;margin-right:auto" onclick="excluirCliente()">🗑️ Excluir</button>
          <button type="button" class="btn" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn ouro">💾 Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let CLIENTES = [], FUNCOES = [], EQUIPE = [], editandoId = null;

    const grade = 'grid-template-columns: 2.2fr 1fr 1.1fr 1.1fr 1.1fr 1.1fr';

    // Dropdown de responsáveis filtrado pela função do colaborador
    function opcoesEquipe(funcaoKey, selecionado) {
      const nomes = EQUIPE.filter(m => m.funcao === funcaoKey).map(m => m.nome);
      const sel = (selecionado || '').trim();
      if (sel && !nomes.some(n => n.toUpperCase() === sel.toUpperCase()) &&
          !['EQUIPE PRÓPRIA', 'NÃO TEM'].includes(sel.toUpperCase())) {
        nomes.push(sel); // mantém valor atual mesmo que a pessoa tenha outra função
      }
      const especiais = [`<option value="EQUIPE PRÓPRIA" ${sel === 'EQUIPE PRÓPRIA' ? 'selected' : ''}>EQUIPE PRÓPRIA</option>`];
      if (funcaoKey === 'consultor') {
        especiais.push(`<option value="NÃO TEM" ${sel === 'NÃO TEM' ? 'selected' : ''}>NÃO TEM</option>`);
      }
      return ['<option value="">—</option>',
        ...nomes.sort((a, b) => a.localeCompare(b)).map(n =>
          `<option value="${esc(n)}" ${sel && n.toUpperCase() === sel.toUpperCase() ? 'selected' : ''}>${esc(n)}</option>`),
        ...especiais,
      ].join('');
    }

    function render() {
      const busca = document.getElementById('fBusca').value.trim().toLowerCase();
      const st = document.getElementById('fStatus').value;
      const marca = document.getElementById('fMarca').value;
      const pessoa = document.getElementById('fPessoa').value.toUpperCase();
      const filtrados = CLIENTES.filter(c => {
        const stEf = statusEfetivo(c);
        if (st === 'saiu') { if (stEf !== 'saiu') return false; }
        else {
          if (stEf === 'saiu') return false; // quem saiu só aparece no histórico
          if (st && st !== 'ativos' && stEf !== st) return false; // 'ativos' = toda a carteira
        }
        if (busca && !c.nome.toLowerCase().includes(busca)) return false;
        if (marca && (c.marca || '') !== marca) return false;
        if (pessoa) {
          const [fk, nome] = pessoa.includes('|') ? pessoa.split('|') : [null, pessoa];
          const bate = (v) => (v || '').toUpperCase().split('/').map(s => s.trim()).includes(nome);
          if (fk) { if (!bate(c.responsaveis[fk.toLowerCase()])) return false; }
          else if (!FUNCOES.some(f => bate(c.responsaveis[f.key]))) return false;
        }
        return true;
      });
      const ordem = document.getElementById('fOrdem').value;
      if (ordem === 'saida-recente') filtrados.sort((a, b) => (b.dataSaida || '').localeCompare(a.dataSaida || ''));
      else if (ordem === 'saida-antiga') filtrados.sort((a, b) => (a.dataSaida || '').localeCompare(b.dataSaida || ''));
      else filtrados.sort((a, b) => a.nome.localeCompare(b.nome));
      const total = CLIENTES.filter(c => statusEfetivo(c) !== 'saiu').length;
      document.getElementById('contagem').textContent = st === 'saiu'
        ? `${filtrados.length} clientes no histórico`
        : `${filtrados.length} de ${total} clientes`;
      const podeEditar = window.USUARIO.papel === 'admin';
      document.getElementById('tabela').innerHTML = [
        `<div class="linha cabecalho" style="${grade}"><div>Cliente</div><div>Status</div><div>Atendimento</div><div>Planejamento</div><div>Copy</div><div>Consultor</div></div>`,
        ...filtrados.map(c => {
          const stEf = statusEfetivo(c);
          const badge = stEf === 'saiu'
            ? `<span class="badge saiu">📁 Saiu em ${fmtData(c.dataSaida)}</span>`
            : `<span class="badge ${stEf}">${STATUS_LABEL[stEf]}</span>`;
          return `
          <div class="linha ${podeEditar ? 'clicavel' : ''}" style="${grade}" ${podeEditar ? `onclick="abrirModal('${c.id}')"` : ''}>
            <div style="display:flex;align-items:center;gap:10px">${logoMarcaHtml(c)}<div><b>${esc(c.nome)}</b>${c.obs ? `<br><small style="color:var(--texto-suave)">${esc(c.obs)}</small>` : ''}</div></div>
            <div>${badge}</div>
            <div>${esc(c.responsaveis.atendimento || '—')}</div>
            <div>${esc(c.responsaveis.planejamento || '—')}</div>
            <div>${esc(c.responsaveis.copy || '—')}</div>
            <div>${esc(c.responsaveis.consultor || '—')}</div>
          </div>`;
        }),
      ].join('') || '<div class="vazio">Nenhum cliente encontrado.</div>';
    }

    function abrirModal(id) {
      editandoId = id || null;
      const c = id ? CLIENTES.find(x => x.id === id) : null;
      document.getElementById('modalTitulo').textContent = c ? `✏️ ${c.nome}` : '➕ Novo Cliente';
      document.getElementById('cNome').value = c?.nome || '';
      document.getElementById('cMarca').value = c?.marca || '';
      document.getElementById('marcas').innerHTML = [...new Set(CLIENTES.map(x => x.marca).filter(Boolean))].sort().map(m => `<option value="${esc(m)}">`).join('');
      document.getElementById('cStatus').value = (c?.status === 'prelancamento' ? 'ativo' : c?.status) || 'ativo';
      document.getElementById('cInauguracao').value = c?.dataInauguracao || '';
      document.getElementById('cSaida').value = c?.dataSaida || '';
      // Aniversário: só dia e mês (o ano guardado é simbólico)
      const [, anivM, anivD] = (c?.aniversario || '').split('-');
      document.getElementById('cAnivDia').innerHTML = '<option value="">Dia</option>' +
        Array.from({ length: 31 }, (_, i) => `<option value="${String(i + 1).padStart(2, '0')}" ${anivD == String(i + 1).padStart(2, '0') ? 'selected' : ''}>${i + 1}</option>`).join('');
      const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      document.getElementById('cAnivMes').innerHTML = '<option value="">Mês</option>' +
        MESES.map((m, i) => `<option value="${String(i + 1).padStart(2, '0')}" ${anivM == String(i + 1).padStart(2, '0') ? 'selected' : ''}>${m}</option>`).join('');
      document.getElementById('cEntrada').value = c?.dataEntrada || '';
      document.getElementById('cAcesso').value = c?.acessoTrafego ? 'sim' : 'nao';
      document.getElementById('cObs').value = c?.obs || '';
      document.getElementById('camposFuncoes').innerHTML = FUNCOES.map(f => `
        <div><label>👤 ${esc(f.label)}</label><select data-funcao="${f.key}">${opcoesEquipe(f.key, c?.responsaveis?.[f.key] || '')}</select></div>`).join('');
      document.getElementById('btnExcluir').style.display = c ? 'inline-block' : 'none';
      document.getElementById('modalErro').textContent = '';
      document.getElementById('modalFundo').classList.add('aberto');
    }

    function fecharModal() { document.getElementById('modalFundo').classList.remove('aberto'); }

    async function excluirCliente() {
      const c = CLIENTES.find(x => x.id === editandoId);
      if (!confirm(`Excluir o cliente "${c.nome}"? Essa ação não pode ser desfeita.\n\nDica: para manter histórico, prefira marcar a data de saída em vez de excluir.`)) return;
      try {
        await api(`/api/clientes/${editandoId}`, { method: 'DELETE' });
        fecharModal(); await carregar();
      } catch (e) { document.getElementById('modalErro').textContent = e.message; }
    }

    document.getElementById('formCliente').addEventListener('submit', async (e) => {
      e.preventDefault();
      const responsaveis = {};
      document.querySelectorAll('[data-funcao]').forEach(s => responsaveis[s.dataset.funcao] = s.value);
      const corpo = {
        nome: document.getElementById('cNome').value,
        marca: document.getElementById('cMarca').value,
        status: document.getElementById('cStatus').value,
        responsaveis,
        acessoTrafego: document.getElementById('cAcesso').value === 'sim',
        dataInauguracao: document.getElementById('cInauguracao').value || null,
        dataSaida: document.getElementById('cSaida').value || null,
        aniversario: (document.getElementById('cAnivDia').value && document.getElementById('cAnivMes').value)
          ? `2000-${document.getElementById('cAnivMes').value}-${document.getElementById('cAnivDia').value}`
          : null,
        dataEntrada: document.getElementById('cEntrada').value || null,
        obs: document.getElementById('cObs').value,
      };
      try {
        if (editandoId) await api(`/api/clientes/${editandoId}`, { method: 'PUT', body: corpo });
        else await api('/api/clientes', { method: 'POST', body: corpo });
        fecharModal(); await carregar();
      } catch (e2) { document.getElementById('modalErro').textContent = e2.message; }
    });

    async function carregar() {
      [CLIENTES, EQUIPE] = await Promise.all([api('/api/clientes'), api('/api/equipe')]);
      CLIENTES.sort((a, b) => a.nome.localeCompare(b.nome));

      // Dropdown de pessoas agrupado por função (nomes compostos separados)
      const porFuncao = {};
      FUNCOES.forEach(f => porFuncao[f.key] = new Set());
      CLIENTES.forEach(c => FUNCOES.forEach(f => {
        const bruto = (c.responsaveis[f.key] || '').trim();
        const up = bruto.toUpperCase();
        if (!bruto || up === 'EQUIPE PRÓPRIA' || up === 'NÃO TEM') return;
        bruto.split('/').map(s => s.trim()).filter(Boolean).forEach(n => porFuncao[f.key].add(n));
      }));
      const sel = document.getElementById('fPessoa');
      const atual = sel.value;
      sel.innerHTML = '<option value="">Todas as pessoas</option>' +
        FUNCOES.map(f => {
          const nomes = [...porFuncao[f.key]].sort((a, b) => a.localeCompare(b));
          if (!nomes.length) return '';
          return `<optgroup label="${esc(f.label)}">` +
            nomes.map(n => { const v = `${f.key}|${n.toUpperCase()}`; return `<option value="${esc(v)}" ${v === atual ? 'selected' : ''}>${esc(n)}</option>`; }).join('') +
            '</optgroup>';
        }).join('');

      const selM = document.getElementById('fMarca');
      const atualM = selM.value;
      selM.innerHTML = '<option value="">Todas as marcas</option>' +
        [...new Set(CLIENTES.map(c => c.marca).filter(Boolean))].sort().map(m => `<option ${m === atualM ? 'selected' : ''}>${esc(m)}</option>`).join('');
      render();
    }

    // Inauguração escolhida → aniversário (dia/mês) preenche sozinho
    document.getElementById('cInauguracao').addEventListener('change', function () {
      if (!this.value) return;
      const [, m, d] = this.value.split('-');
      document.getElementById('cAnivDia').value = d;
      document.getElementById('cAnivMes').value = m;
    });

    // Fechar modal com Esc ou clicando fora
    document.getElementById('modalFundo').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) fecharModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') fecharModal(); });

    (async () => {
      const user = await montarSidebar('clientes.html');
      if (user.papel === 'admin') document.getElementById('btnNovo').style.display = 'inline-block';
      FUNCOES = (await api('/api/meta')).funcoes;
      // Filtro vindo dos cards do dashboard (?status=...)
      const params = new URLSearchParams(location.search);
      const param = params.get('status');
      if (param) document.getElementById('fStatus').value = param;
      ['fBusca', 'fStatus', 'fMarca', 'fPessoa', 'fOrdem'].forEach(id => document.getElementById(id).addEventListener('input', render));
      await carregar();
      // Abrir direto o cadastro de um cliente específico (vindo da Visão por Pessoa, por exemplo)
      const abrirId = params.get('abrir');
      if (abrirId && user.papel === 'admin') abrirModal(abrirId);
    })();
  </script>
</body>
</html>
